name: Deploy to PyPI 📦

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["Deploy to TestPyPI 📦"]
    branches: [ master, main ]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to PyPI 📦
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # only run if TestPyPI workflow succeeded, or triggered manually
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build

      - name: Install package dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Log triggering workflow info when run via workflow_run
      - name: Verify TestPyPI deployment
        if: github.event_name == 'workflow_run'
        run: |
          echo "Triggered by: ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"

      # Audit packages for vulnerabilities before building
      - name: Security check before build
        run: |
          pip install pip-audit
          pip-audit --skip-editable
        continue-on-error: true

      # Build sdist and wheel, then verify package integrity
      - name: Build distribution packages
        run: |
          echo "Building distribution packages..."
          python -m build
          echo "Checking package integrity..."
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-pypi
          path: dist/

      # Upload built distributions to production PyPI
      - name: Upload to PyPI
        run: |
          echo "Uploading packages to production PyPI..."
          twine upload dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        timeout-minutes: 5

      # Allow time for PyPI to process the upload
      - name: Wait for PyPI processing
        run: sleep 30s

      # Install from PyPI to confirm the upload succeeded
      - name: Install and verify from PyPI
        run: |
          echo "Installing aaindex from production PyPI..."
          pip install aaindex --upgrade
          echo "Verifying installation..."
          python -c "import aaindex; print(f'aaindex {aaindex.__version__} installed successfully')"
        timeout-minutes: 5
        continue-on-error: true

      # Cross-check installed version against source version
      - name: Verify package version
        run: |
          INSTALLED_VERSION=$(pip show aaindex | grep Version | cut -d ' ' -f 2)
          SOURCE_VERSION=$(python -c "import aaindex; print(aaindex.__version__)" 2>/dev/null || echo "unknown")
          echo "Installed version: $INSTALLED_VERSION"
          echo "Source version: $SOURCE_VERSION"
          if [ "$INSTALLED_VERSION" != "$SOURCE_VERSION" ]; then
            echo "Warning: Version mismatch detected"
            echo "Installed: $INSTALLED_VERSION"
            echo "Source: $SOURCE_VERSION"
          fi
        continue-on-error: true

      # Write deployment summary to the workflow run page
      - name: Create job summary
        if: always()
        run: |
          echo "## PyPI Production Deployment Summary 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: aaindex" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: Production PyPI" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "- **Triggered By**: ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Test Conclusion**: ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            echo "**Build Artifacts**: $(ls -1 dist/ | wc -l) files" >> $GITHUB_STEP_SUMMARY
            ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          fi
